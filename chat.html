<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceIA — Chat de Teste</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(180deg, #0a1628 0%, #0f1d32 100%);
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Setup Screen ─────────────────────────── */
    #setup-screen {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0d1f3c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .setup-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      backdrop-filter: blur(20px);
    }

    .setup-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
    }

    .setup-title {
      color: #f1f5f9;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .setup-subtitle {
      color: #64748b;
      font-size: 14px;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .field-label {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 16px;
    }

    .field-input:focus {
      border-color: rgba(59,130,246,0.5);
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', system-ui;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled {
      background: rgba(255,255,255,0.05);
      color: #475569;
      cursor: not-allowed;
    }

    .setup-footer {
      color: #475569;
      font-size: 11px;
      text-align: center;
      margin-top: 24px;
      line-height: 1.5;
    }

    /* ── Chat Screen ──────────────────────────── */
    #chat-screen {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.02);
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .chat-title { font-weight: 700; font-size: 15px; }
    .chat-subtitle { font-size: 11px; color: #64748b; }

    .header-buttons { display: flex; gap: 8px; }

    .btn-header {
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', system-ui;
      transition: all 0.2s;
    }

    .btn-header.active-filter {
      background: rgba(59,130,246,0.2);
      border-color: rgba(59,130,246,0.4);
      color: #60a5fa;
    }

    .btn-header.active-debug {
      background: rgba(234,179,8,0.15);
      border-color: rgba(234,179,8,0.3);
      color: #facc15;
    }

    /* Filters */
    #filters-bar {
      display: none;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      gap: 12px;
      align-items: center;
      background: rgba(59,130,246,0.03);
      flex-wrap: wrap;
    }

    .filter-select, .filter-input {
      padding: 6px 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      font-family: 'DM Sans', system-ui;
    }

    .filter-input {
      width: 50px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
    }

    .filter-label {
      color: #94a3b8;
      font-size: 12px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-user, .msg-assistant {
      max-width: 80%;
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-user {
      align-self: flex-end;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 16px 16px 4px 16px;
    }

    .msg-assistant {
      align-self: flex-start;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px 16px 16px 4px;
    }

    .msg-loading {
      align-self: flex-start;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px 16px 16px 4px;
      color: #64748b;
      font-size: 14px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .dot { animation: pulse 1.5s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }

    .debug-panel {
      padding: 14px 18px;
      background: rgba(234,179,8,0.05);
      border: 1px solid rgba(234,179,8,0.15);
      border-radius: 12px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: #fbbf24;
      align-self: stretch;
    }

    .debug-title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .debug-content { color: #d4d4d8; line-height: 1.8; }
    .debug-fund { margin-left: 8px; color: #a1a1aa; }

    /* Empty state */
    .empty-state {
      text-align: center;
      margin-top: 60px;
      color: #475569;
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-text { font-size: 16px; font-weight: 500; color: #64748b; }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 24px;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    .suggestion-btn {
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', system-ui;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      background: rgba(59,130,246,0.08);
      border-color: rgba(59,130,246,0.2);
      color: #cbd5e1;
    }

    /* Input area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #e2e8f0;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: 'DM Sans', system-ui;
      line-height: 1.5;
    }

    #chat-input:focus { border-color: rgba(59,130,246,0.4); }

    #send-btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', system-ui;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    #send-btn:hover { opacity: 0.9; }
    #send-btn:disabled {
      background: rgba(255,255,255,0.05);
      color: #475569;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <!-- ══════════════ Setup Screen ══════════════ -->
  <div id="setup-screen">
    <div class="setup-card">
      <div class="setup-icon">💰</div>
      <h1 class="setup-title">FinanceIA — Chat de Teste</h1>
      <p class="setup-subtitle">Configure as chaves para testar a RAG de ponta a ponta</p>

      <label class="field-label">RAG API Key (sua API_SECRET_KEY)</label>
      <input type="password" id="rag-key" class="field-input" placeholder="A chave que você definiu no .env">

      <label class="field-label">Anthropic API Key (Claude)</label>
      <input type="password" id="claude-key" class="field-input" placeholder="sk-ant-... (sua chave da Anthropic)">

      <button class="btn-primary" id="connect-btn" onclick="handleConnect()">
        Conectar e Iniciar Chat
      </button>

      <p class="setup-footer">
        A RAG API Key autentica a busca de fundos no Supabase.<br>
        A Anthropic API Key é usada para chamar o Claude.
      </p>
    </div>
  </div>

  <!-- ══════════════ Chat Screen ══════════════ -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-logo">💰</div>
        <div>
          <div class="chat-title">FinanceIA</div>
          <div class="chat-subtitle" id="chat-status">Conectando...</div>
        </div>
      </div>
      <div class="header-buttons">
        <button class="btn-header" id="btn-filters" onclick="toggleFilters()">⚙ Filtros</button>
        <button class="btn-header" id="btn-debug" onclick="toggleDebug()">🐛 Debug</button>
      </div>
    </div>

    <div id="filters-bar">
      <select class="filter-select" id="filter-plataforma">
        <option value="">Todas plataformas</option>
        <option value="XP">XP</option>
        <option value="BTG">BTG</option>
        <option value="Inter">Inter</option>
        <option value="Itau">Itaú</option>
        <option value="Santander">Santander</option>
        <option value="Bradesco">Bradesco</option>
      </select>
      <select class="filter-select" id="filter-categoria">
        <option value="">Todas categorias</option>
        <option value="Renda Fixa">Renda Fixa</option>
        <option value="Multimercado">Multimercado</option>
        <option value="Ações">Ações</option>
        <option value="Internacional">Internacional</option>
      </select>
      <span class="filter-label">Top-K:</span>
      <input type="number" class="filter-input" id="filter-topk" value="5" min="1" max="20">
    </div>

    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <p class="empty-text">Faça uma pergunta sobre fundos de investimento</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="useSuggestion(this)">→ Qual fundo de renda fixa com boa liquidez para perfil conservador?</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">→ Compare fundos multimercado disponíveis na XP</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">→ Quero um fundo de previdência para longo prazo</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">→ Quais fundos de crédito privado têm os melhores retornos?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea id="chat-input" rows="1" placeholder="Pergunte sobre fundos de investimento..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend()}"></textarea>
      <button id="send-btn" onclick="handleSend()">Enviar</button>
    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────
    const RAG_API_URL = "https://financeia-rag-api-production.up.railway.app";
    let ragApiKey = "";
    let claudeApiKey = "";
    let premissasContexto = "";
    let conversationHistory = [];
    let debugMode = false;
    let filtersVisible = false;
    let isLoading = false;

    const SYSTEM_PROMPT = `Você é o assessor de investimentos virtual da 3A Riva Investimentos, uma assessoria vinculada à XP Investimentos.

Suas diretrizes:
- Responda de forma clara, objetiva e profissional
- Use os dados dos fundos fornecidos no contexto para embasar suas recomendações
- Sempre considere as premissas e diretrizes do assessor
- Quando não houver fundos relevantes no contexto, seja honesto sobre isso
- Nunca invente dados sobre fundos — use apenas o que está no contexto
- Formate valores monetários em R$ e percentuais com 2 casas decimais
- Seja proativo em alertar sobre riscos e pontos de atenção`;

    // ── Setup ────────────────────────────────────────────
    async function handleConnect() {
      ragApiKey = document.getElementById("rag-key").value.trim();
      claudeApiKey = document.getElementById("claude-key").value.trim();

      if (!ragApiKey || !claudeApiKey) {
        alert("Preencha ambas as chaves.");
        return;
      }

      const btn = document.getElementById("connect-btn");
      btn.textContent = "Conectando...";
      btn.disabled = true;

      try {
        // Test RAG API connection and load premissas
        const resp = await fetch(`${RAG_API_URL}/premissas`, {
          headers: { "X-API-Key": ragApiKey }
        });

        if (!resp.ok) {
          throw new Error(`RAG API retornou ${resp.status}. Verifique a API Key.`);
        }

        const data = await resp.json();
        premissasContexto = data.contexto_premissas || "";

        // Switch to chat screen
        document.getElementById("setup-screen").style.display = "none";
        const chatScreen = document.getElementById("chat-screen");
        chatScreen.style.display = "flex";

        document.getElementById("chat-status").textContent =
          `RAG • ${data.total} premissas • 1.476 fundos`;

        document.getElementById("chat-input").focus();

      } catch (e) {
        alert("Erro: " + e.message);
        btn.textContent = "Conectar e Iniciar Chat";
        btn.disabled = false;
      }
    }

    // ── Chat ─────────────────────────────────────────────
    function useSuggestion(btn) {
      const text = btn.textContent.replace("→ ", "");
      document.getElementById("chat-input").value = text;
      document.getElementById("chat-input").focus();
    }

    function addMessage(role, content) {
      const emptyState = document.getElementById("empty-state");
      if (emptyState) emptyState.remove();

      const div = document.createElement("div");
      div.className = role === "user" ? "msg-user" : "msg-assistant";
      div.textContent = content;
      document.getElementById("messages").appendChild(div);
      scrollToBottom();
    }

    function addLoading() {
      const div = document.createElement("div");
      div.className = "msg-loading";
      div.id = "loading-indicator";
      div.innerHTML = '<span class="dot">●</span> <span class="dot">●</span> <span class="dot">●</span>';
      document.getElementById("messages").appendChild(div);
      scrollToBottom();
    }

    function removeLoading() {
      const el = document.getElementById("loading-indicator");
      if (el) el.remove();
    }

    function addDebugInfo(info) {
      if (!debugMode) return;

      // Remove previous debug panel
      const prev = document.getElementById("debug-panel");
      if (prev) prev.remove();

      const div = document.createElement("div");
      div.className = "debug-panel";
      div.id = "debug-panel";

      let fundosHtml = "";
      if (info.fundos && info.fundos.length > 0) {
        fundosHtml = info.fundos.map((f, i) =>
          `<div class="debug-fund">${i+1}. ${f.nome.substring(0, 70)}... (sim: ${f.similaridade})</div>`
        ).join("");
      }

      div.innerHTML = `
        <div class="debug-title">🐛 Debug — Última busca</div>
        <div class="debug-content">
          Fundos encontrados: ${info.fundos_encontrados}<br>
          Filtros: ${JSON.stringify(info.filtros)}<br>
          System prompt: ~${info.system_chars} chars<br>
          User prompt: ~${info.user_chars} chars<br>
          ${fundosHtml}
        </div>
      `;

      document.getElementById("messages").appendChild(div);
      scrollToBottom();
    }

    function scrollToBottom() {
      const container = document.getElementById("messages");
      container.scrollTop = container.scrollHeight;
    }

    async function handleSend() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text || isLoading) return;

      input.value = "";
      isLoading = true;
      document.getElementById("send-btn").disabled = true;

      addMessage("user", text);
      addLoading();

      try {
        // 1. Search funds via RAG API
        const plataforma = document.getElementById("filter-plataforma").value;
        const categoria = document.getElementById("filter-categoria").value;
        const topK = parseInt(document.getElementById("filter-topk").value) || 5;

        const ragPayload = { pergunta: text, top_k: topK };
        if (plataforma) ragPayload.plataforma = plataforma;
        if (categoria) ragPayload.categoria = categoria;

        const ragResp = await fetch(`${RAG_API_URL}/buscar`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": ragApiKey,
          },
          body: JSON.stringify(ragPayload),
        });

        let contextoFundos = "";
        let ragData = null;

        if (ragResp.ok) {
          ragData = await ragResp.json();
          contextoFundos = ragData.contexto_consolidado;
        }

        // 2. Build prompt
        const systemPrompt = premissasContexto
          ? `${SYSTEM_PROMPT}\n\n${premissasContexto}`
          : SYSTEM_PROMPT;

        const userPrompt = contextoFundos
          ? `${contextoFundos}\n\nPergunta do cliente: ${text}`
          : `Pergunta do cliente: ${text}`;

        // Keep conversation history
        conversationHistory.push({ role: "user", content: userPrompt });

        // 3. Call Claude API
        const claudeResp = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": claudeApiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 2000,
            system: systemPrompt,
            messages: conversationHistory,
          }),
        });

        if (!claudeResp.ok) {
          const errData = await claudeResp.json().catch(() => ({}));
          throw new Error(`Claude API ${claudeResp.status}: ${errData.error?.message || "erro desconhecido"}`);
        }

        const claudeData = await claudeResp.json();
        const assistantText = claudeData.content
          ?.filter(b => b.type === "text")
          .map(b => b.text)
          .join("\n") || "Erro ao processar resposta.";

        conversationHistory.push({ role: "assistant", content: assistantText });

        removeLoading();
        addMessage("assistant", assistantText);

        // Debug info
        if (debugMode && ragData) {
          addDebugInfo({
            fundos_encontrados: ragData.total_resultados,
            fundos: ragData.fundos?.map(f => ({
              nome: f.nome,
              similaridade: f.similaridade,
            })) || [],
            filtros: ragData.filtros_aplicados,
            system_chars: systemPrompt.length,
            user_chars: userPrompt.length,
          });
        }

      } catch (e) {
        removeLoading();
        const errDiv = document.createElement("div");
        errDiv.className = "error-msg";
        errDiv.textContent = `Erro: ${e.message}`;
        document.getElementById("messages").appendChild(errDiv);
        scrollToBottom();
      } finally {
        isLoading = false;
        document.getElementById("send-btn").disabled = false;
        input.focus();
      }
    }

    // ── Toggles ──────────────────────────────────────────
    function toggleFilters() {
      filtersVisible = !filtersVisible;
      document.getElementById("filters-bar").style.display = filtersVisible ? "flex" : "none";
      document.getElementById("btn-filters").className = "btn-header" + (filtersVisible ? " active-filter" : "");
    }

    function toggleDebug() {
      debugMode = !debugMode;
      document.getElementById("btn-debug").className = "btn-header" + (debugMode ? " active-debug" : "");
    }

    // ── Enter on setup ───────────────────────────────────
    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && document.getElementById("setup-screen").style.display !== "none") {
        handleConnect();
      }
    });
  </script>
</body>
</html>
